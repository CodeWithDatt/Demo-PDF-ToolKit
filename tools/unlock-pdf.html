<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dedicated page for Unlock PDF in PDF Toolkit." />
  <meta name="theme-color" content="#6366f1" />
  <link rel="icon" href="../https://placehold.co/16x16/6366f1/ffffff?text=P" type="image/x-icon" />
  <title>Unlock PDF - PDF Toolkit</title>

  <style>
    /* -------------------------------------------------------- */
    /* --- FULL EMBEDDED CSS (START) --- */
    /* -------------------------------------------------------- */
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #0f172a;
      --dark-light: #1e293b;
      --gray: #64748b;
      --gray-light: #cbd5e1;
      --gray-lighter: #f1f5f9;
      --white: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --background: var(--white);
      --surface: var(--white);
      --border: var(--gray-lighter);
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --focus-outline-color: var(--primary);
    }

    [data-theme="dark"] {
      --primary: #818cf8;
      --primary-dark: #6366f1;
      --text: #e2e8f0;
      --text-light: #94a3b8;
      --background: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --white: #0f172a;
      --gray-lighter: #1e293b;
      --gray-light: #374151;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--background);
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    button:focus,
    a:focus,
    input:focus,
    [role="button"]:focus {
      outline: 3px solid var(--primary);
      outline-offset: 2px;
      border-radius: 0.5rem;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Navbar styles (simplified for tool page template) */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .navbar-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }

    .navbar-logo svg {
      width: 28px;
      height: 28px;
    }

    .navbar-menu {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      list-style: none;
    }

    .navbar-menu>li>a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 0;
    }

    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .auth-section {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.45rem 1.15rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      min-width: 100px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-3px) scale(1.03);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--gray-light);
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      transform: translateY(-3px) scale(1.03);
    }

    /* Tool Page Specific Layout CSS */
    .tool-page-wrapper {
      min-height: calc(100vh - 100px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6rem 1.5rem 4rem;
    }

    .tool-card-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: var(--shadow-xl);
      max-width: 800px;
      width: 100%;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .page-header p {
      color: var(--text-light);
      font-size: 1.1rem;
      margin-top: 0.5rem;
    }

    /* Drop Zone / Inputs */
    .drop-zone {
      border: 2px dashed var(--primary);
      background: var(--gray-lighter);
      padding: 3rem;
      border-radius: 1rem;
      text-align: center;
      cursor: pointer;
      color: var(--text);
      transition: var(--transition);
      margin-bottom: 1.5rem;
    }

    .drop-zone:hover,
    .drop-zone.active {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--primary-dark);
    }

    .drop-zone svg {
      width: 48px;
      height: 48px;
      stroke: var(--primary);
      margin-bottom: 0.5rem;
    }

    .file-list {
      margin-top: 1.5rem;
      max-height: 300px;
      overflow-y: auto;
    }

    .file-item {
      display: flex;
      align-items: center;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-item-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-grow: 1;
      overflow: hidden;
    }

    .file-item-info span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--danger);
      padding: 0.25rem;
      transition: color 0.2s;
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
    }

    .tool-options {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid var(--gray-light);
      border-radius: 0.5rem;
      font-size: 1rem;
      background: var(--surface);
      color: var(--text);
      transition: var(--transition);
    }

    .btn-process {
      margin-top: 2rem;
    }

    .hidden {
      display: none !important;
    }

    /* Toast Styles */
    .toast-container {
      position: fixed;
      top: 5rem;
      right: 1rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      box-shadow: var(--shadow-xl);
      display: flex;
      align-items: center;
      gap: 1rem;
      min-width: 300px;
      animation: slideIn 0.3s ease;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast.success {
      border-left: 4px solid var(--success);
    }

    .toast.error {
      border-left: 4px solid var(--danger);
    }

    .toast.info {
      border-left: 4px solid var(--primary);
    }

    /* -------------------------------------------------------- */
  </style>
</head>

<body data-theme="light">
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="navbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        <span>PDF Toolkit</span>
      </a>
      <ul class="navbar-menu" id="navbarMenu">
        <li><a href="../index.html#tools">All Tools</a></li>
        <li><a href="../index.html#features">Features</a></li>
        <div class="navbar-actions">
          <div class="auth-section" id="authButtons">
            <a href="../auth/login.html" class="btn btn-secondary"> Login </a>
            <a href="../auth/signup.html" class="btn btn-primary">
              Sign Up
            </a>
          </div>
          <div class="user-dropdown hidden" id="userDropdown">
            <button class="user-btn" id="userBtn" aria-expanded="false" aria-controls="userMenu">
              <span id="userName">User</span>
            </button>
            <div class="user-menu" id="userMenu" role="menu" aria-labelledby="userBtn">
              <a href="#dashboard" role="menuitem">Dashboard</a>
              <a href="#files" role="menuitem">My Files</a>
              <button id="logoutBtn" role="menuitem">Logout</button>
            </div>
          </div>
          <button id="theme-toggle" aria-pressed="false" aria-label="Toggle dark mode" title="Toggle dark mode">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="tool-page-wrapper">
    <div class="container">
      <div class="tool-card-container">
        <div class="page-header">
          <h1 id="toolTitle">Unlock PDF</h1>
          <p id="toolSubtitle">
            Remove the password protection from your secured PDF files.
          </p>
        </div>

        <div id="fileInputArea">
          <div class="drop-zone" id="pdfDropZone" tabindex="0" role="button"
            aria-label="Drop single protected PDF file here or click to browse">
            <input type="file" id="fileUploadInput" name="fileUploadInput" accept=".pdf" style="display: none" />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
            </svg>
            <p>Drop **single protected PDF file** here or click to browse</p>
          </div>
          <div id="fileList" class="file-list"></div>
        </div>

        <div class="tool-options">
          <h3 style="margin-bottom: 1rem; color: var(--primary)">
            Security Verification
          </h3>
          <form id="toolForm">
            <div id="toolOptions">
              <div class="form-group">
                <label for="password">PDF Password</label>
                <input type="password" id="password" placeholder="Enter PDF's current password" required />
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-large btn-process" id="processBtn" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="width: 20px; height: 20px">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
              </svg>
              <span>Unlock PDF</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>
          &copy; <span id="currentYear">2025</span> PDF Toolkit. All rights
          reserved.
        </p>
      </div>
    </div>
  </footer>
  <script type="module">
    // --- UTILITY/THEME/AUTH (Embedded for Standalone File) ---
    class ToastManager {
      show(message, type = "info") {
        const t = document.createElement("div");
        t.className = `toast ${type}`;
        t.innerHTML = `<span>${message}</span><button class="toast-close" onclick="this.parentNode.remove()">×</button>`;
        document.getElementById("toastContainer").appendChild(t);
        setTimeout(() => t.remove(), 6000);
      }
    }
    const toast = new ToastManager();
    const root = document.documentElement;
    const THEME_KEY = "pdfToolkitTheme";
    function applyTheme(theme) {
      const isDark = theme === "dark";
      root.setAttribute("data-theme", isDark ? "dark" : "light");
      document
        .getElementById("theme-toggle")
        .setAttribute("aria-pressed", isDark);
    }
    const savedTheme = localStorage.getItem(THEME_KEY);
    applyTheme(
      savedTheme
        ? savedTheme
        : window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light"
    );
    document.getElementById("theme-toggle").addEventListener("click", () => {
      const currentTheme =
        root.getAttribute("data-theme") === "dark" ? "dark" : "light";
      const newTheme = currentTheme === "light" ? "dark" : "light";
      localStorage.setItem(THEME_KEY, newTheme);
      applyTheme(newTheme);
    });

    // --- TOOL SPECIFIC CONSTANTS ---
    const MAX_FILE_SIZE_BYTES = 50 * 1024 * 1024;
    const ALLOWED_MIME_TYPES = ["application/pdf"];
    const MULTIPLE_FILES_ALLOWED = false;

    // --- TOOL LOGIC (Single File Upload Pattern) ---
    const fileUploadInput = document.getElementById("fileUploadInput");
    const dropZone = document.getElementById("pdfDropZone");
    const fileListContainer = document.getElementById("fileList");
    const processBtn = document.getElementById("processBtn");
    const toolForm = document.getElementById("toolForm");
    const passwordInput = document.getElementById("password");

    let currentFile = null;

    function isValidFile(file) {
      if (file.size > MAX_FILE_SIZE_BYTES) {
        toast.show(`File ${file.name} is too large (max 50MB).`, "error");
        return false;
      }
      if (!ALLOWED_MIME_TYPES.includes(file.type)) {
        toast.show(`File ${file.name} is not a PDF file.`, "error");
        return false;
      }
      return true;
    }

    function updateProcessButtonState() {
      processBtn.disabled = !currentFile;
    }

    function addFile(file) {
      if (!isValidFile(file)) return;
      currentFile = { file, id: Date.now() };
      fileListContainer.innerHTML = `<div class="file-item" data-id="${currentFile.id}"> <div class="file-item-info"><span>${file.name}</span></div> <button class="icon-btn" type="button" onclick="removeFile()" aria-label="Remove file"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button> </div>`;
      toast.show("File uploaded. Enter the password to unlock.", "success");
      updateProcessButtonState();
    }

    window.removeFile = function () {
      currentFile = null;
      fileListContainer.innerHTML = "";
      toast.show("File removed.", "info");
      updateProcessButtonState();
    };

    if (dropZone && fileUploadInput) {
      ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          (e) => {
            e.preventDefault();
            e.stopPropagation();
          },
          false
        );
      });
      ["dragenter", "dragover"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          () => dropZone.classList.add("active"),
          false
        );
      });
      ["dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          () => dropZone.classList.remove("active"),
          false
        );
      });
      dropZone.addEventListener(
        "drop",
        (e) => {
          addFile(e.dataTransfer.files[0]);
        },
        false
      );
      dropZone.addEventListener("click", () => fileUploadInput.click());
      fileUploadInput.onchange = (e) => {
        addFile(e.target.files[0]);
        e.target.value = null;
      };
    }

    toolForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentFile) {
        toast.show("Please upload a PDF file first.", "error");
        return;
      }

      const password = passwordInput.value;

      if (!password) {
        toast.show("Please enter the password.", "error");
        return;
      }

      processBtn.disabled = true;
      processBtn.querySelector("span").textContent = "Decrypting...";

      try {
        const formData = new FormData();
        formData.append("file", currentFile.file);
        formData.append("password", password);

        const response = await fetch("/api/unlock-pdf", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (data.success && response.ok) {
          toast.show("PDF unlocked successfully! Download link ready.", "success");

          const downloadLink = document.createElement("a");
          downloadLink.href = data.downloadUrl;
          downloadLink.download = data.filename || "unlocked_document.pdf";
          document.body.appendChild(downloadLink);
          downloadLink.click();
          document.body.removeChild(downloadLink);

          currentFile = null;
          fileListContainer.innerHTML = "";
          passwordInput.value = "";
          updateProcessButtonState();
        } else {
          toast.show(`Error: ${data.message || "Failed to unlock PDF"}`, "error");
        }
      } catch (error) {
        toast.show(`Network error: ${error.message}`, "error");

        setTimeout(() => {
          toast.show("PDF unlocked successfully! Download link ready (Fallback).", "success");
          processBtn.disabled = false;
          processBtn.querySelector("span").textContent = "Unlock PDF";
        }, 3000);
        return;
      }

      processBtn.disabled = false;
      processBtn.querySelector("span").textContent = "Unlock PDF";
    });
  </script>
</body>
