<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reorder PDF Pages - Organize pages like iLovePDF" />
  <meta name="theme-color" content="#6366f1" />
  <title>Organize PDF Pages - PDF Toolkit</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #0f172a;
      --dark-light: #1e293b;
      --gray: #64748b;
      --gray-light: #cbd5e1;
      --gray-lighter: #f1f5f9;
      --white: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --background: var(--white);
      --surface: var(--white);
      --border: var(--gray-lighter);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --primary: #818cf8;
      --primary-dark: #6366f1;
      --text: #e2e8f0;
      --text-light: #94a3b8;
      --background: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --gray-lighter: #1e293b;
      --gray-light: #374151;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--background);
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .navbar-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }

    .navbar-logo svg {
      width: 32px;
      height: 32px;
    }

    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.9rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--gray-light);
    }

    #theme-toggle {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-container {
      flex: 1;
      display: flex;
      width: 100%;
      overflow: hidden;
    }

    .upload-section {
      flex: 0 0 35%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow-y: auto;
    }

    .upload-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .upload-description {
      font-size: 1rem;
      margin-bottom: 2rem;
      opacity: 0.95;
    }

    .drop-zone {
      width: 100%;
      max-width: 280px;
      border: 3px dashed rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.1);
      padding: 2.5rem 1.5rem;
      border-radius: 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .drop-zone:hover,
    .drop-zone.active {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.8);
      transform: scale(1.02);
    }

    .drop-zone-icon {
      width: 64px;
      height: 64px;
      opacity: 0.9;
    }

    .drop-zone-text {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .drop-zone-subtext {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    input[type="file"] {
      display: none;
    }

    .editor-section {
      flex: 1;
      background: var(--surface);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .editor-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .editor-info {
      font-size: 0.9rem;
      color: var(--text-light);
      margin-left: auto;
      margin-right: 1rem;
    }

    .editor-actions {
      display: flex;
      gap: 0.75rem;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: var(--transition);
      font-weight: 600;
      font-size: 0.85rem;
    }

    .icon-btn:hover:not(:disabled) {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .icon-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pages-container {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.25rem;
      padding-right: 0.5rem;
    }

    .pages-container::-webkit-scrollbar {
      width: 8px;
    }

    .pages-container::-webkit-scrollbar-track {
      background: var(--gray-lighter);
      border-radius: 4px;
    }

    .pages-container::-webkit-scrollbar-thumb {
      background: var(--gray-light);
      border-radius: 4px;
    }

    .pages-container::-webkit-scrollbar-thumb:hover {
      background: var(--gray);
    }

    .page-item {
      position: relative;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
      cursor: grab;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      aspect-ratio: 3/4;
      min-height: 120px;
    }

    .page-item:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
    }

    .page-item.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .page-item.drag-over {
      border: 2px solid var(--primary);
      background: rgba(99, 102, 241, 0.08);
      transform: scale(1.05);
    }

    .page-thumbnail {
      width: 100%;
      height: 85%;
      background: var(--gray-lighter);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--text-light);
      font-size: 0.75rem;
      overflow: hidden;
      position: relative;
    }

    .page-thumbnail canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .page-number {
      width: 100%;
      height: 15%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .page-actions {
      position: absolute;
      top: 4px;
      right: 4px;
      display: none;
      gap: 0.25rem;
      z-index: 10;
    }

    .page-item:hover .page-actions {
      display: flex;
    }

    .page-action-btn {
      width: 28px;
      height: 28px;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      border-radius: 0.35rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      transition: var(--transition);
    }

    .page-action-btn:hover {
      background: var(--danger);
      transform: scale(1.1);
    }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text-light);
      text-align: center;
    }

    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--gray-light);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .bottom-section {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .btn-process {
      flex: 1;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      height: auto;
    }

    .toast-container {
      position: fixed;
      top: 80px;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      box-shadow: var(--shadow-xl);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 320px;
      animation: slideIn 0.3s ease;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast.success {
      border-left: 4px solid var(--success);
    }

    .toast.error {
      border-left: 4px solid var(--danger);
    }

    .toast.info {
      border-left: 4px solid var(--primary);
    }

    .no-file-message {
      color: var(--text-light);
      text-align: center;
      padding: 2rem;
      font-size: 0.95rem;
    }

    @media (max-width: 1024px) {
      .main-container {
        flex-direction: column;
      }

      .upload-section {
        flex: 0 0 auto;
        min-height: 250px;
      }

      .editor-section {
        flex: 1;
      }

      .pages-container {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }

      .bottom-section {
        flex-direction: column;
      }

      .btn-process {
        width: 100%;
      }
    }

    @media (max-width: 768px) {
      .navbar-container {
        padding: 0.5rem 1rem;
      }

      .upload-section {
        padding: 2rem 1rem;
      }

      .editor-section {
        padding: 1rem;
      }

      .pages-container {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.75rem;
      }

      .page-item {
        min-height: 100px;
      }

      .editor-info {
        margin-left: 0;
        margin-right: 0;
        font-size: 0.8rem;
      }
    }
  </style>
</head>

<body data-theme="light">
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="navbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        <span>PDF Toolkit</span>
      </a>
      <div class="navbar-actions">
        <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="upload-section">
      <div class="upload-title">PDF Organizer</div>
      <p class="upload-description">Upload your PDF and reorder pages by dragging them</p>

      <div class="drop-zone" id="pdfDropZone">
        <input type="file" id="fileUploadInput" accept=".pdf" />
        <svg class="drop-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <div class="drop-zone-text">Select PDF</div>
        <div class="drop-zone-subtext">or drag and drop</div>
      </div>
    </div>

    <div class="editor-section">
      <div class="editor-header">
        <div class="editor-title">Pages</div>
        <div class="editor-info" id="pageCount"></div>
        <div class="editor-actions">
          <button class="icon-btn" id="sortAscBtn" title="Sort ascending" disabled>A→Z</button>
          <button class="icon-btn" id="deleteAllBtn" title="Delete all" disabled>✕ All</button>
        </div>
      </div>

      <div class="pages-container" id="pagesContainer">
        <div class="no-file-message">Upload a PDF to start organizing pages</div>
      </div>

      <div class="bottom-section">
        <button class="btn btn-primary btn-process" id="processBtn" disabled>
          <span>⬇ Download Organized PDF</span>
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    // Set up PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    class ToastManager {
      show(message, type = "info") {
        const t = document.createElement("div");
        t.className = `toast ${type}`;
        t.innerHTML = `<span>${message}</span>`;
        document.getElementById("toastContainer").appendChild(t);
        setTimeout(() => t.remove(), 4000);
      }
    }

    const toast = new ToastManager();

    // Theme
    const root = document.documentElement;
    const THEME_KEY = "pdfToolkitTheme";

    function applyTheme(theme) {
      root.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
    }

    const savedTheme = localStorage.getItem(THEME_KEY) ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(savedTheme);

    document.getElementById("theme-toggle").addEventListener("click", () => {
      const newTheme = root.getAttribute("data-theme") === "light" ? "dark" : "light";
      localStorage.setItem(THEME_KEY, newTheme);
      applyTheme(newTheme);
    });

    // Constants
    const MAX_FILE_SIZE_BYTES = 50 * 1024 * 1024;
    const ALLOWED_MIME_TYPES = ["application/pdf"];

    // DOM Elements
    const fileUploadInput = document.getElementById("fileUploadInput");
    const dropZone = document.getElementById("pdfDropZone");
    const pagesContainer = document.getElementById("pagesContainer");
    const processBtn = document.getElementById("processBtn");
    const sortAscBtn = document.getElementById("sortAscBtn");
    const deleteAllBtn = document.getElementById("deleteAllBtn");
    const pageCountEl = document.getElementById("pageCount");

    let currentFile = null;
    let pages = [];
    let draggedPage = null;
    let pdfDoc = null;

    // Validation
    function isValidFile(file) {
      if (file.size > MAX_FILE_SIZE_BYTES) {
        toast.show(`File is too large (max 50MB)`, "error");
        return false;
      }
      if (!ALLOWED_MIME_TYPES.includes(file.type)) {
        toast.show("Only PDF files are allowed", "error");
        return false;
      }
      return true;
    }

    async function renderPageThumbnail(pageNum, canvasElement) {
      try {
        const page = await pdfDoc.getPage(pageNum);
        const scale = 1.5;
        const viewport = page.getViewport({ scale });

        canvasElement.width = viewport.width;
        canvasElement.height = viewport.height;

        const renderContext = {
          canvasContext: canvasElement.getContext('2d'),
          viewport: viewport
        };

        await page.render(renderContext).promise;
      } catch (error) {
        console.error(`Error rendering page ${pageNum}:`, error);
      }
    }

    function renderPages() {
      if (!currentFile) {
        pagesContainer.innerHTML = '<div class="no-file-message">Upload a PDF to start organizing pages</div>';
        pageCountEl.textContent = '';
        return;
      }

      if (pages.length === 0) {
        pagesContainer.innerHTML = '<div class="no-file-message">No pages loaded</div>';
        pageCountEl.textContent = '';
        return;
      }

      pageCountEl.textContent = `${pages.length} pages`;
      pagesContainer.innerHTML = "";

      pages.forEach((page, index) => {
        const pageEl = document.createElement("div");
        pageEl.className = "page-item";
        pageEl.draggable = true;
        pageEl.dataset.pageId = page.id;
        pageEl.dataset.index = index;

        pageEl.innerHTML = `
          <div class="page-thumbnail">
            <canvas></canvas>
          </div>
          <div class="page-number">Page ${page.number}</div>
          <div class="page-actions">
            <button class="page-action-btn" onclick="deletePage(${page.id})" title="Delete">×</button>
          </div>
        `;

        const canvas = pageEl.querySelector('canvas');
        renderPageThumbnail(page.number, canvas);

        pageEl.addEventListener("dragstart", handleDragStart);
        pageEl.addEventListener("dragend", handleDragEnd);
        pageEl.addEventListener("dragover", handleDragOver);
        pageEl.addEventListener("drop", handleDrop);
        pageEl.addEventListener("dragleave", handleDragLeave);

        pagesContainer.appendChild(pageEl);
      });
    }

    function handleDragStart(e) {
      draggedPage = this;
      this.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    }

    function handleDragEnd(e) {
      this.classList.remove("dragging");
      document.querySelectorAll(".page-item").forEach(el => el.classList.remove("drag-over"));
      draggedPage = null;
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (this !== draggedPage) {
        this.classList.add("drag-over");
      }
    }

    function handleDragLeave(e) {
      this.classList.remove("drag-over");
    }

    function handleDrop(e) {
      e.preventDefault();
      if (this === draggedPage) return;

      const draggedIndex = parseInt(draggedPage.dataset.index);
      const targetIndex = parseInt(this.dataset.index);

      if (draggedIndex !== targetIndex) {
        [pages[draggedIndex], pages[targetIndex]] = [pages[targetIndex], pages[draggedIndex]];
        renderPages();
      }

      this.classList.remove("drag-over");
    }

    window.deletePage = function (pageId) {
      pages = pages.filter(p => p.id !== pageId);
      if (pages.length === 0) {
        currentFile = null;
        processBtn.disabled = true;
        sortAscBtn.disabled = true;
        deleteAllBtn.disabled = true;
      }
      renderPages();
      toast.show("Page deleted", "info");
    };

    sortAscBtn.addEventListener("click", () => {
      if (pages.length === 0) return;
      pages.sort((a, b) => a.number - b.number);
      renderPages();
      toast.show("Pages sorted", "info");
    });

    deleteAllBtn.addEventListener("click", () => {
      if (pages.length === 0) return;
      if (confirm("Delete all pages? This will clear the editor.")) {
        pages = [];
        currentFile = null;
        pdfDoc = null;
        renderPages();
        processBtn.disabled = true;
        sortAscBtn.disabled = true;
        deleteAllBtn.disabled = true;
        toast.show("All pages deleted", "info");
      }
    });

    async function addFile(file) {
      if (!isValidFile(file)) return;

      currentFile = { file, id: Date.now() };

      try {
        pagesContainer.innerHTML = '<div class="no-file-message"><div class="loading-spinner"></div><p style="margin-top: 1rem;">Loading PDF pages...</p></div>';

        const arrayBuffer = await file.arrayBuffer();
        pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

        const totalPages = pdfDoc.numPages;
        pages = Array.from({ length: totalPages }, (_, i) => ({
          id: i + 1,
          number: i + 1
        }));

        renderPages();
        processBtn.disabled = false;
        sortAscBtn.disabled = false;
        deleteAllBtn.disabled = false;
        toast.show(`PDF loaded with ${totalPages} pages`, "success");
      } catch (error) {
        console.error("Error loading PDF:", error);
        toast.show("Error loading PDF file", "error");
        currentFile = null;
        pdfDoc = null;
        renderPages();
      }
    }

    // Drag & Drop Setup
    ["dragenter", "dragover", "dragleave", "drop"].forEach(eventName => {
      dropZone.addEventListener(eventName, e => {
        e.preventDefault();
        e.stopPropagation();
      }, false);
    });

    ["dragenter", "dragover"].forEach(eventName => {
      dropZone.addEventListener(eventName, () => {
        dropZone.classList.add("active");
      }, false);
    });

    ["dragleave", "drop"].forEach(eventName => {
      dropZone.addEventListener(eventName, () => {
        dropZone.classList.remove("active");
      }, false);
    });

    dropZone.addEventListener("drop", e => {
      const files = e.dataTransfer.files;
      if (files.length > 0) addFile(files[0]);
    }, false);

    dropZone.addEventListener("click", () => {
      fileUploadInput.click();
    });

    fileUploadInput.addEventListener("change", e => {
      if (e.target.files.length > 0) {
        addFile(e.target.files[0]);
      }
      e.target.value = "";
    });

    // Download
    processBtn.addEventListener("click", async () => {
      if (!currentFile || pages.length === 0) {
        toast.show("Please upload a PDF and keep at least one page", "error");
        return;
      }

      processBtn.disabled = true;
      processBtn.innerHTML = "<span>⏳ Processing...</span>";

      try {
        const formData = new FormData();
        formData.append("file", currentFile.file);
        formData.append("pageOrder", JSON.stringify(pages.map(p => p.number)));

        const response = await fetch("/api/reorder-pdf", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (data.success && response.ok) {
          const link = document.createElement("a");
          link.href = data.downloadUrl;
          link.download = data.filename || "organized.pdf";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);

          toast.show("PDF downloaded successfully!", "success");
          currentFile = null;
          pages = [];
          pdfDoc = null;
          renderPages();
          processBtn.disabled = true;
          sortAscBtn.disabled = true;
          deleteAllBtn.disabled = true;
        } else {
          toast.show(`Error: ${data.message || "Failed to process"}`, "error");
        }
      } catch (error) {
        toast.show(`Error: ${error.message}`, "error");
      }

      processBtn.disabled = false;
      processBtn.innerHTML = "<span>⬇ Download Organized PDF</span>";
    });
  </script>
</body>

</html>
