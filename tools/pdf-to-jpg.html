<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dedicated page for PDF to JPG in PDF Toolkit." />
  <meta name="theme-color" content="#6366f1" />
  <link rel="icon" href="../https://placehold.co/16x16/6366f1/ffffff?text=P" type="image/x-icon" />
  <title>PDF to JPG - PDF Toolkit</title>

  <style>
    /* -------------------------------------------------------- */
    /* --- FULL EMBEDDED CSS (START) --- */
    /* -------------------------------------------------------- */
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #0f172a;
      --dark-light: #1e293b;
      --gray: #64748b;
      --gray-light: #cbd5e1;
      --gray-lighter: #f1f5f9;
      --white: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --background: var(--white);
      --surface: var(--white);
      --border: var(--gray-lighter);
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --focus-outline-color: var(--primary);
    }

    [data-theme="dark"] {
      --primary: #818cf8;
      --primary-dark: #6366f1;
      --text: #e2e8f0;
      --text-light: #94a3b8;
      --background: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --white: #0f172a;
      --gray-lighter: #1e293b;
      --gray-light: #374151;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--background);
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    button:focus,
    a:focus,
    input:focus,
    [role="button"]:focus {
      outline: 3px solid var(--primary);
      outline-offset: 2px;
      border-radius: 0.5rem;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Navbar styles */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .navbar-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }

    .navbar-logo svg {
      width: 28px;
      height: 28px;
    }

    .navbar-menu {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      list-style: none;
    }

    .navbar-menu>li>a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 0;
    }

    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .auth-section {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.45rem 1.15rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      min-width: 100px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-3px) scale(1.03);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--gray-light);
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      transform: translateY(-3px) scale(1.03);
    }

    /* Tool Page Layout */
    .tool-page-wrapper {
      min-height: calc(100vh - 100px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6rem 1.5rem 4rem;
    }

    .tool-card-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: var(--shadow-xl);
      max-width: 800px;
      width: 100%;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .page-header p {
      color: var(--text-light);
      font-size: 1.1rem;
      margin-top: 0.5rem;
    }

    /* Drop Zone */
    .drop-zone {
      border: 2px dashed var(--primary);
      background: var(--gray-lighter);
      padding: 3rem;
      border-radius: 1rem;
      text-align: center;
      cursor: pointer;
      color: var(--text);
      transition: var(--transition);
      margin-bottom: 1.5rem;
    }

    .drop-zone:hover,
    .drop-zone.active {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--primary-dark);
    }

    .drop-zone svg {
      width: 48px;
      height: 48px;
      stroke: var(--primary);
      margin-bottom: 0.5rem;
    }

    .file-list {
      margin-top: 1.5rem;
      max-height: 300px;
      overflow-y: auto;
    }

    .file-item {
      display: flex;
      align-items: center;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-item-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-grow: 1;
      overflow: hidden;
    }

    .file-item-info span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--danger);
      padding: 0.25rem;
      transition: color 0.2s;
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
    }

    .tool-options {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid var(--gray-light);
      border-radius: 0.5rem;
      font-size: 1rem;
      background: var(--surface);
      color: var(--text);
      transition: var(--transition);
    }

    .btn-process {
      margin-top: 2rem;
    }

    .hidden {
      display: none !important;
    }

    /* Toast Styles */
    .toast-container {
      position: fixed;
      top: 5rem;
      right: 1rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      box-shadow: var(--shadow-xl);
      display: flex;
      align-items: center;
      gap: 1rem;
      min-width: 300px;
      animation: slideIn 0.3s ease;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast.success {
      border-left: 4px solid var(--success);
    }

    .toast.error {
      border-left: 4px solid var(--danger);
    }

    .toast.info {
      border-left: 4px solid var(--primary);
    }
  </style>
</head>

<body data-theme="light">
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="navbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        <span>PDF Toolkit</span>
      </a>
      <ul class="navbar-menu" id="navbarMenu">
        <li><a href="../index.html#tools">All Tools</a></li>
        <li><a href="../index.html#features">Features</a></li>
        <div class="navbar-actions">
          <div class="auth-section" id="authButtons">
            <a href="../auth/login.html" class="btn btn-secondary"> Login </a>
            <a href="../auth/signup.html" class="btn btn-primary">
              Sign Up
            </a>
          </div>
          <button id="theme-toggle" aria-pressed="false" aria-label="Toggle dark mode" title="Toggle dark mode">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
      </ul>
    </div>
  </nav>

  <div class="tool-page-wrapper">
    <div class="container">
      <div class="tool-card-container">
        <div class="page-header">
          <h1 id="toolTitle">PDF to JPG</h1>
          <p id="toolSubtitle">
            Convert every page in your PDF document into high-quality JPG
            images.
          </p>
        </div>

        <div id="fileInputArea">
          <div class="drop-zone" id="pdfDropZone" tabindex="0" role="button"
            aria-label="Drop single PDF file here or click to browse">
            <input type="file" id="fileUploadInput" name="fileUploadInput" accept=".pdf" style="display: none" />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <p>Drop **single PDF file** here or click to browse</p>
          </div>
          <div id="fileList" class="file-list"></div>
        </div>

        <div class="tool-options">
          <h3 style="margin-bottom: 1rem; color: var(--primary)">
            Output Settings
          </h3>
          <form id="toolForm">
            <div id="toolOptions">
              <div class="form-group">
                <label for="imageQuality">Image Quality</label>
                <select id="imageQuality" required>
                  <option value="100">High (Lossless)</option>
                  <option value="85" selected>Standard (85% Quality)</option>
                  <option value="60">Economy (60% Quality)</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-large btn-process" id="processBtn" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="width: 20px; height: 20px">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              <span>Convert to JPG</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>
          &copy; <span id="currentYear">2025</span> PDF Toolkit. All rights
          reserved.
        </p>
      </div>
    </div>
  </footer>

  <script type="module">
    // --- TOAST MANAGER ---
    class ToastManager {
      show(message, type = "info") {
        const t = document.createElement("div");
        t.className = `toast ${type}`;
        t.innerHTML = `<span>${message}</span><button class="toast-close" onclick="this.parentNode.remove()">×</button>`;
        document.getElementById("toastContainer").appendChild(t);
        setTimeout(() => t.remove(), 6000);
      }
    }
    const toast = new ToastManager();

    // --- THEME MANAGER ---
    const root = document.documentElement;
    const THEME_KEY = "pdfToolkitTheme";

    function applyTheme(theme) {
      const isDark = theme === "dark";
      root.setAttribute("data-theme", isDark ? "dark" : "light");
      document.getElementById("theme-toggle").setAttribute("aria-pressed", isDark);
    }

    const savedTheme = localStorage.getItem(THEME_KEY);
    applyTheme(
      savedTheme
        ? savedTheme
        : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light"
    );

    document.getElementById("theme-toggle").addEventListener("click", () => {
      const currentTheme = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
      const newTheme = currentTheme === "light" ? "dark" : "light";
      localStorage.setItem(THEME_KEY, newTheme);
      applyTheme(newTheme);
    });

    // --- TOOL CONSTANTS ---
    const MAX_FILE_SIZE_BYTES = 50 * 1024 * 1024; // 50MB
    const ALLOWED_MIME_TYPES = ["application/pdf"];

    // --- DOM ELEMENTS ---
    const fileUploadInput = document.getElementById("fileUploadInput");
    const dropZone = document.getElementById("pdfDropZone");
    const fileListContainer = document.getElementById("fileList");
    const processBtn = document.getElementById("processBtn");
    const toolForm = document.getElementById("toolForm");

    let currentFile = null;

    // --- VALIDATION ---
    function isValidFile(file) {
      if (file.size > MAX_FILE_SIZE_BYTES) {
        toast.show(`File ${file.name} is too large (max 50MB).`, "error");
        return false;
      }
      if (!ALLOWED_MIME_TYPES.includes(file.type)) {
        toast.show(`File ${file.name} is not a PDF file.`, "error");
        return false;
      }
      return true;
    }

    function updateProcessButtonState() {
      processBtn.disabled = !currentFile;
    }

    function addFile(file) {
      if (!isValidFile(file)) return;

      const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
      currentFile = { file, id: Date.now() };

      fileListContainer.innerHTML = `
          <div class="file-item" data-id="${currentFile.id}">
            <div class="file-item-info">
              <span>${file.name}</span>
              <span class="text-xs text-gray-500">(${sizeInMB} MB)</span>
            </div>
            <button class="icon-btn" type="button" onclick="window.removeFile()" aria-label="Remove file" title="Remove">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        `;

      toast.show("PDF uploaded successfully. Select quality and convert.", "success");
      updateProcessButtonState();
    }

    window.removeFile = function () {
      currentFile = null;
      fileListContainer.innerHTML = "";
      toast.show("File removed.", "info");
      updateProcessButtonState();
    };

    // --- DRAG & DROP SETUP ---
    if (dropZone && fileUploadInput) {
      ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          (e) => {
            e.preventDefault();
            e.stopPropagation();
          },
          false
        );
      });

      ["dragenter", "dragover"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          () => dropZone.classList.add("active"),
          false
        );
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          () => dropZone.classList.remove("active"),
          false
        );
      });

      dropZone.addEventListener("drop", (e) => {
        if (e.dataTransfer.files[0]) {
          addFile(e.dataTransfer.files[0]);
        }
      }, false);

      dropZone.addEventListener("click", () => fileUploadInput.click());

      fileUploadInput.onchange = (e) => {
        if (e.target.files[0]) {
          addFile(e.target.files[0]);
        }
        e.target.value = null;
      };
    }

    // --- FORM SUBMISSION (BACKEND INTEGRATION) ---
    toolForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!currentFile) {
        toast.show("Please upload a PDF file first.", "error");
        return;
      }

      const imageQuality = document.getElementById("imageQuality").value;

      processBtn.disabled = true;
      processBtn.querySelector("span").textContent = "Converting...";

      try {
        const formData = new FormData();
        formData.append("file", currentFile.file);
        formData.append("quality", imageQuality);

        const response = await fetch("/api/pdf-to-jpg", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (data.success && response.ok) {
          toast.show("Conversion complete! Download ready.", "success");

          // Auto-download
          const downloadLink = document.createElement("a");
          downloadLink.href = data.downloadUrl;
          downloadLink.download = data.filename || "images.zip";
          document.body.appendChild(downloadLink);
          downloadLink.click();
          document.body.removeChild(downloadLink);

          // Reset form
          currentFile = null;
          fileListContainer.innerHTML = "";
          updateProcessButtonState();
        } else {
          toast.show(`Error: ${data.message || "Failed to convert PDF"}`, "error");
        }
      } catch (error) {
        console.error("Error:", error);
        toast.show(`Network error: ${error.message}`, "error");
      }

      processBtn.disabled = false;
      processBtn.querySelector("span").textContent = "Convert to JPG";
    });
  </script>
</body>

</html>
